name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Make-based build: gcc + clang on Linux/macOS -------------------------
  make:
    name: make / ${{ matrix.os }} / ${{ matrix.cxx }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Build & test (make)
        run: make CXX=${{ matrix.cxx }} clean all test

  # --- CMake-based build: cross-platform incl. Windows/MSVC -----------------
  cmake:
    name: cmake / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  # --- Format check (advisory: surfaces drift without blocking PRs) ---------
  format:
    name: clang-format (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          git diff --name-only HEAD -- \
            'src/*.cpp' 'include/*.hpp' 'tests/*.cpp' \
            | xargs -r clang-format --dry-run --Werror -i
